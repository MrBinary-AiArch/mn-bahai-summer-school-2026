<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save the Date! MN Baha'i Summer School 2026</title>
  </head>
  <body class="bg-gradient-to-b from-[#7dd3e0] via-[#fef08a] to-[#fb923c] min-h-screen font-sans text-slate-900 overflow-x-hidden">
    
    <!-- String Lights Decoration -->
    <div class="absolute top-0 left-0 w-full flex justify-around opacity-80 pointer-events-none pt-2 text-yellow-100">
        <div class="w-4 h-4 bg-current rounded-full shadow-[0_0_10px_white]"></div>
        <div class="w-4 h-4 bg-current rounded-full shadow-[0_0_10px_white] mt-4"></div>
        <div class="w-4 h-4 bg-current rounded-full shadow-[0_0_10px_white] mt-2"></div>
        <div class="w-4 h-4 bg-current rounded-full shadow-[0_0_10px_white] mt-6"></div>
        <div class="w-4 h-4 bg-current rounded-full shadow-[0_0_10px_white] mt-3"></div>
        <div class="w-4 h-4 bg-current rounded-full shadow-[0_0_10px_white] mt-5"></div>
        <div class="w-4 h-4 bg-current rounded-full shadow-[0_0_10px_white] mt-1"></div>
    </div>

    <div id="app" class="max-w-4xl mx-auto px-6 py-12 flex flex-col items-center text-center relative z-10">
      
      <!-- Canva Save the Date Flyer -->
      <div class="w-full mb-12">
        <div style="position: relative; width: 100%; height: 0; padding-top: 129.4118%;
         padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em;
         overflow: hidden;
         border-radius: 8px; will-change: transform;">
         <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none;
          padding: 0;margin: 0;"
          src="https://www.canva.com/design/DAHAUA1dxss/w7RAzGy2cv1NZpyrlad2kQ/view?embed"
          allowfullscreen="allowfullscreen" allow="fullscreen">
         </iframe>
        </div>
        <a href="https:&#x2F;&#x2F;www.canva.com&#x2F;design&#x2F;DAHAUA1dxss&#x2F;w7RAzGy2cv1NZpyrlad2kQ&#x2F;view?utm_content=DAHAUA1dxss&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener" class="text-slate-800 font-bold hover:underline">Open Save the Date Flyer</a>
      </div>

      <!-- Volunteers Needed -->
      <div class="bg-red-900/10 border-2 border-red-900/20 text-red-900 px-6 py-2 rounded-lg transform -rotate-3 mb-16 font-black uppercase tracking-widest text-lg md:text-xl">
        Volunteers Needed!
      </div>

      <!-- Countdown Timer -->
      <div class="w-full bg-white/40 backdrop-blur-sm rounded-2xl p-8 shadow-xl mb-16 border border-white/50 mx-4">
        <h4 class="text-xl font-black uppercase tracking-widest text-slate-800 mb-6 italic">Countdown to Gathering</h4>
        <div id="countdown" class="grid grid-cols-4 gap-4 md:gap-8">
            <div class="flex flex-col items-center">
                <span id="days" class="text-3xl md:text-5xl font-black text-orange-600">00</span>
                <span class="text-xs md:text-sm font-bold uppercase text-slate-600">Days</span>
            </div>
            <div class="flex flex-col items-center">
                <span id="hours" class="text-3xl md:text-5xl font-black text-orange-600">00</span>
                <span class="text-xs md:text-sm font-bold uppercase text-slate-600">Hours</span>
            </div>
            <div class="flex flex-col items-center">
                <span id="minutes" class="text-3xl md:text-5xl font-black text-orange-600">00</span>
                <span class="text-xs md:text-sm font-bold uppercase text-slate-600">Mins</span>
            </div>
            <div class="flex flex-col items-center">
                <span id="seconds" class="text-3xl md:text-5xl font-black text-orange-600 animate-pulse">00</span>
                <span class="text-xs md:text-sm font-bold uppercase text-slate-600">Secs</span>
            </div>
        </div>
      </div>

      <!-- Notify Me Form -->
      <div class="w-full max-w-xl bg-white p-8 rounded-2xl shadow-2xl border-t-8 border-orange-500 mx-4">
        <h4 class="text-2xl font-black text-slate-800 mb-2 uppercase tracking-tight leading-tight">Registration is almost here!</h4>
        <p class="text-slate-600 font-medium mb-8">Sign up to get an alert the moment registration opens.</p>
        
        <form id="notify-form" class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-2">
            <input type="email" placeholder="Enter your email" required class="flex-grow px-6 py-4 rounded-xl bg-slate-100 border-2 border-transparent focus:border-orange-500 focus:bg-white transition duration-300 outline-none font-bold">
            <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white font-black px-8 py-4 rounded-xl transition duration-300 transform hover:scale-105 active:scale-95 shadow-lg uppercase tracking-wider">
                Notify Me
            </button>
        </form>
        <p id="form-message" class="mt-4 text-emerald-600 font-bold hidden">You're on the list! We'll be in touch soon.</p>
      </div>

      <!-- Return to Home -->
      <div class="mt-12 opacity-60 hover:opacity-100 transition">
        <a href="/" class="font-bold text-slate-800 border-b-2 border-slate-800 uppercase tracking-widest text-sm">Back to Main Site</a>
      </div>

    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
